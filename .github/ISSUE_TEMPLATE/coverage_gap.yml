name: Missing framework or language coverage
description: Mappamind didn't recognize a language, framework, or cross-service channel it should have.
title: "[coverage] "
labels: ["coverage"]
body:
  - type: markdown
    attributes:
      value: |
        New coverage in Mappamind is **a prompt + a schema, never a new framework catcher**
        (the anti-treadmill rule). Describe the *shape* of what was missed rather than a
        pattern to hardcode — that's what we can act on.
  - type: textarea
    id: missed
    attributes:
      label: What wasn't recognized
      description: A language, framework, RPC style, or a cross-service channel that should have been drawn.
    validations:
      required: true
  - type: textarea
    id: shape
    attributes:
      label: What the code looks like
      description: A small, representative snippet of how the call/contract is expressed (provider and consumer side, if it's a channel). Redact anything private.
      render: text
    validations:
      required: true
  - type: input
    id: lang
    attributes:
      label: Language / framework
      placeholder: "e.g. Go + gRPC, Java + Feign, Python + FastAPI"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected to see
      description: The channel, contract, or capability you expected on the card or in the Studio.
    validations:
      required: true
